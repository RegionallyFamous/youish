name: Regression case
description: Propose a deterministic fixture for scripts/regression_100.py.
title: "Regression case: "
labels: ["regression", "tests"]
body:
  - type: markdown
    attributes:
      value: |
        Use this when you already know the failure should become a fixture. Keep examples public-safe and redacted.
  - type: input
    id: case_id
    attributes:
      label: Suggested case id
      placeholder: thought_dump_missing_throughline_01
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Thought dump
        - Voice preservation
        - Factual drift
        - Unsupported claim
        - Legal or precision-sensitive
        - Format preservation
        - Constraint handling
        - Output wrapper or note
        - Other
    validations:
      required: true
  - type: textarea
    id: source
    attributes:
      label: Source fixture
      description: The source text the case should test.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected rewrite behavior
      description: Describe or paste the expected output.
    validations:
      required: true
  - type: textarea
    id: validators
    attributes:
      label: Suggested validators
      description: Required terms, protected facts, forbidden terms, voice markers, prompt mode, word count, format constraints, etc.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed secrets, API keys, customer data, and private drafts that should not be public.
          required: true
