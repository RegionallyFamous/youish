name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Validate skill metadata
        run: python3 scripts/validate_skill.py

      - name: Run deterministic regression fixtures
        run: python3 scripts/regression_100.py

      - name: Verify Dittobot lab tools
        run: |
          python3 scripts/audit.py --source "I think notice may be due in 10 days." --rewrite "I think notice may be due in 10 days." --preserve-uncertainty --protected "10 days"
          python3 scripts/case_lab.py --case-id sample_case_01 --source "rough but redacted source" --rewrite "clean but still redacted rewrite" --must "redacted" | grep "sample_case_01"
          python3 scripts/audit.py --source "[[keep: 10 days]] [[voice: haunted changelog]] I think notice may be due in 10 days." --rewrite "I think notice may be due in 10 days, haunted changelog and all." --preserve-uncertainty --json | grep '"status": "PASS"'
          python3 scripts/voice_probe.py --sample "This draft is not bad. It just apologizes for existing." | grep "Voice Probe"
          transcript="$RUNNER_TEMP/live.local.jsonl"
          printf '%s\n' \
            '{"case":"thought_dump_launch_note_01","prompt_mode":"source_only","model":"gpt-5.2","skill_sha256":"abc123def456789","usage":{"input_tokens":100,"output_tokens":20,"total_tokens":120},"errors":[]}' \
            '{"case":"legal_precision_01","prompt_mode":"explicit_rewrite","model":"gpt-5.2","skill_sha256":"abc123def456789","usage":{"input_tokens":90,"output_tokens":30},"errors":["lost uncertainty marker"]}' \
            > "$transcript"
          python3 scripts/live_report.py "$transcript" | grep "LIVE EVAL REPORT"
          ! python3 scripts/live_report.py "$transcript" --fail-under 0.75

      - name: Compile scripts
        run: python3 -m py_compile scripts/*.py

      - name: Check install verifier without local paths
        run: |
          mkdir -p "$RUNNER_TEMP/codex-skills"
          ln -s "$GITHUB_WORKSPACE" "$RUNNER_TEMP/codex-skills/dittobot"
          python3 scripts/check_install.py --install-dir "$RUNNER_TEMP/codex-skills/dittobot"

      - name: Check installer
        run: |
          python3 scripts/install.py --install-dir "$RUNNER_TEMP/codex-skills-installed/dittobot"

      - name: Verify live eval skip path
        env:
          OPENAI_API_KEY: ""
        run: python3 scripts/live_eval.py --limit 1

      - name: Verify live eval case inspection
        run: |
          python3 scripts/live_eval.py --list-cases --prompt-mode source_only | grep thought_dump
          python3 scripts/live_eval.py --print-prompts --prompt-mode source_only --limit 1 | grep "ok the launch note"
          ! python3 scripts/live_eval.py --max-failures 0
          ! python3 scripts/live_eval.py --max-total-tokens 0
          ! python3 scripts/live_eval.py --save-jsonl live-eval-results.jsonl --print-prompts --limit 1
