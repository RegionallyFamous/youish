name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Check spec package mirror
        run: |
          python3 scripts/sync_skill_package.py
          git diff --exit-code -- skills/dittobot
          python3 skills/dittobot/scripts/validate_skill.py
          python3 skills/dittobot/scripts/regression_100.py
          python3 skills/dittobot/scripts/install.py --copy --install-dir "$RUNNER_TEMP/mirror-install/dittobot"
          python3 skills/dittobot/scripts/check_install.py --install-dir "$RUNNER_TEMP/mirror-install/dittobot"

      - name: Validate skill metadata
        run: python3 scripts/validate_skill.py

      - name: Check public README copy
        run: |
          python3 scripts/public_copy_check.py --description "Paste messy notes. Get sharp rewrites that sound like you on a good day."
          grep "^## 0.2.0 - " CHANGELOG.md

      - name: Run deterministic regression fixtures
        run: python3 scripts/regression_100.py

      - name: Verify Dittobot lab tools
        run: |
          python3 scripts/audit.py --source "I think notice may be due in 10 days." --rewrite "I think notice may be due in 10 days." --preserve-uncertainty --protected "10 days"
          python3 scripts/case_lab.py --case-id sample_case_01 --source "rough but redacted source" --rewrite "clean but still redacted rewrite" --must "redacted" | grep "sample_case_01"
          python3 scripts/audit.py --source "[[keep: 10 days]] [[voice: haunted changelog]] I think notice may be due in 10 days." --rewrite "I think notice may be due in 10 days, haunted changelog and all." --preserve-uncertainty --json | grep '"status": "PASS"'
          { python3 scripts/rewrite_report.py --source "[[keep: 10 days]] [[voice: haunted changelog]] I think notice may be due in 10 days." --rewrite "Notice is due in 10 days." --preserve-uncertainty || true; } | grep "lost_uncertainty"
          python3 scripts/rewrite_report.py --source "I think notice may be due in 10 days." --rewrite "I think notice may be due in 10 days." --protected "10 days" --preserve-uncertainty --json | grep '"status": "PASS"'
          python3 scripts/voice_probe.py --sample "This draft is not bad. It just apologizes for existing." | grep "Voice Probe"
          profile="$RUNNER_TEMP/profile.local.json"
          python3 scripts/voice_profile.py compile --sample "This draft is not bad. It just walks into the room and apologizes for existing. I want the useful bit without the meeting oatmeal." --profile-id ci-profile --out "$profile"
          python3 scripts/voice_profile.py validate "$profile" | grep "Status: PASS"
          python3 scripts/voice_profile.py render "$profile" --format prompt-md | grep "Use this as editing taste only"
          python3 scripts/redact_case.py --case-id redacted_ci_01 --source "Nick at nick@example.com has sk-abc123456789012345678 and a weird launch note." --rewrite "Nick shipped it." --expected "Person A still needs the weird launch note fixed." --replace "Nick=Person A" --must "launch note" --json | grep '"status": "OK"'
          python3 scripts/failure_fixture.py --case-id fixture_ci_01 --source "[[keep: 10 days]] [[voice: haunted changelog]] I think notice may be due in 10 days. Contact nick@example.com with sk-abc123456789012345678." --failed-rewrite "Notice is due in 10 days." --desired-rewrite "I think notice may be due in 10 days, haunted changelog and all." --preserve-uncertainty --allow-inline-private --json | grep '"status": "READY"'
          transcript="$RUNNER_TEMP/live.local.jsonl"
          printf '%s\n' \
            '{"case":"thought_dump_launch_note_01","prompt_mode":"source_only","model":"gpt-5.2","skill_sha256":"abc123def456789","usage":{"input_tokens":100,"output_tokens":20,"total_tokens":120},"errors":[]}' \
            '{"case":"legal_precision_01","prompt_mode":"explicit_rewrite","model":"gpt-5.2","skill_sha256":"abc123def456789","usage":{"input_tokens":90,"output_tokens":30},"errors":["lost uncertainty marker"]}' \
            > "$transcript"
          python3 scripts/live_report.py "$transcript" | grep "LIVE EVAL REPORT"
          python3 scripts/live_report.py "$transcript" | grep "legal_precision_01"
          python3 scripts/live_report.py "$transcript" --json | grep "lost_uncertainty"
          ! python3 scripts/live_report.py "$transcript" --fail-under 0.75
          scorecard_transcript="$RUNNER_TEMP/scorecard-transcript.json"
          python3 scripts/scorecard.py --transcript "$transcript" --fail-under-score 0 --format json > "$scorecard_transcript"
          python3 - "$scorecard_transcript" <<'PY'
          import json
          import sys
          payload = json.load(open(sys.argv[1], encoding="utf-8"))
          assert payload["schema_version"] == "dittobot.scorecard.v1"
          assert payload["kind"] == "live_transcript"
          assert payload["live_eval"]["records"] == 2
          assert payload["score"]["case_pass_rate"] == 0.5
          assert payload["results"]["failure_codes"]["lost_uncertainty"] == 1
          PY
          raw_transcript="$RUNNER_TEMP/raw.local.jsonl"
          printf '%s\n' '{"case":"thought_dump_launch_note_01","output":"raw output should not be public","errors":[]}' > "$raw_transcript"
          ! python3 scripts/scorecard.py --transcript "$raw_transcript" --public --fail-under-score 0 --format json
          replay="$RUNNER_TEMP/replay.local.jsonl"
          python3 - "$replay" <<'PY'
          import json
          import sys
          sys.path.insert(0, "scripts")
          from regression_100 import make_cases
          cases = {case.id: case for case in make_cases()}
          records = [
              {"case": "thought_dump_launch_note_01", "model": "gpt-5.2", "output": cases["thought_dump_launch_note_01"].rewrite},
              {"case": "legal_precision_01", "model": "gpt-5.2", "output": "Based on the contract, notice is due within 10 business days."},
              {"case": "technical_fidelity_01", "model": "gpt-5.2", "errors": ["API error: HTTP 429: rate limit"], "api_error_code": 429},
          ]
          with open(sys.argv[1], "w", encoding="utf-8") as handle:
              for record in records:
                  handle.write(json.dumps(record) + "\n")
          PY
          replayed="$RUNNER_TEMP/replayed.local.jsonl"
          ! env OPENAI_API_KEY="" OPENAI_API_URL="https://example.invalid/v1/responses" python3 scripts/live_eval.py --replay-jsonl "$replay" --save-jsonl "$replayed"
          python3 scripts/live_report.py "$replayed" | grep "api_error"
          missing_output="$RUNNER_TEMP/missing-output.local.jsonl"
          printf '%s\n' '{"case":"thought_dump_launch_note_01","model":"gpt-5.2"}' > "$missing_output"
          ! python3 scripts/live_eval.py --replay-jsonl "$missing_output"
          ! python3 scripts/build_plugin.py --version not-semver --validator ""
          mkdir -p "$RUNNER_TEMP/not-a-plugin"
          ! python3 scripts/build_plugin.py --output-dir "$RUNNER_TEMP/not-a-plugin" --validator ""
          mkdir -p dist/not-a-plugin
          printf 'do not replace me\n' > dist/not-a-plugin/README.md
          ! python3 scripts/build_plugin.py --output-dir dist/not-a-plugin --validator ""
          rm -rf dist/not-a-plugin
          ok_validator="$RUNNER_TEMP/ok-validator.py"
          printf 'import pathlib, sys\npathlib.Path(sys.argv[1], "validator-ran.txt").write_text("yes")\n' > "$ok_validator"
          fail_validator="$RUNNER_TEMP/fail-validator.py"
          printf 'raise SystemExit(7)\n' > "$fail_validator"
          python3 scripts/build_plugin.py --output-dir "$RUNNER_TEMP/dittobot-plugin-validator" --version 0.2.0 --validator "$ok_validator"
          test -f "$RUNNER_TEMP/dittobot-plugin-validator/validator-ran.txt"
          ! python3 scripts/check_plugin_package.py "$RUNNER_TEMP/dittobot-plugin-validator" --version 0.2.0
          ! python3 scripts/build_plugin.py --output-dir "$RUNNER_TEMP/dittobot-plugin-validator-fail" --version 0.2.0 --validator "$fail_validator"
          ! python3 scripts/build_plugin.py --output-dir "$RUNNER_TEMP/dittobot-plugin" --validator "$RUNNER_TEMP/missing-validator.py" --require-validator
          python3 scripts/build_plugin.py --output-dir "$RUNNER_TEMP/dittobot-plugin" --version 0.2.0 --validator ""
          python3 scripts/check_plugin_package.py "$RUNNER_TEMP/dittobot-plugin" --version 0.2.0
          printf 'secret=nope\n' > "$RUNNER_TEMP/dittobot-plugin/skills/dittobot/.env"
          ! python3 scripts/check_plugin_package.py "$RUNNER_TEMP/dittobot-plugin" --version 0.2.0
          ! python3 scripts/scorecard.py --plugin-dir "$RUNNER_TEMP/dittobot-plugin" --version 0.2.0 --format json
          ! python3 scripts/build_plugin_zip.py "$RUNNER_TEMP/dittobot-plugin" --version 0.2.0 --output-dir "$RUNNER_TEMP"
          rm "$RUNNER_TEMP/dittobot-plugin/skills/dittobot/.env"
          ! python3 scripts/build_skill_zip.py --version not-semver --output-dir "$RUNNER_TEMP"
          python3 scripts/build_skill_zip.py --version 0.2.0 --output-dir "$RUNNER_TEMP"
          python3 scripts/check_skill_zip.py "$RUNNER_TEMP/dittobot-skill-v0.2.0.zip"
          python3 - "$RUNNER_TEMP/dittobot-skill-v0.2.0.zip" <<'PY'
          import sys
          import zipfile
          with zipfile.ZipFile(sys.argv[1]) as handle:
              entries = [info.filename for info in handle.infolist() if not info.filename.endswith("/")]
          assert entries[0] == "dittobot/SKILL.md"
          assert all(entry.startswith("dittobot/") for entry in entries)
          assert "dittobot/README.md" not in entries
          PY
          python3 scripts/build_plugin_zip.py "$RUNNER_TEMP/dittobot-plugin" --version 0.2.0 --output-dir "$RUNNER_TEMP"
          python3 scripts/check_plugin_zip.py "$RUNNER_TEMP/dittobot-plugin-v0.2.0.zip" --version 0.2.0
          unzip_dir="$RUNNER_TEMP/unzipped-plugin"
          mkdir -p "$unzip_dir"
          python3 - "$RUNNER_TEMP/dittobot-plugin-v0.2.0.zip" "$unzip_dir" <<'PY'
          import sys
          import zipfile
          with zipfile.ZipFile(sys.argv[1]) as handle:
              handle.extractall(sys.argv[2])
          PY
          python3 scripts/check_plugin_package.py "$unzip_dir" --version 0.2.0
          python3 scripts/scorecard.py --plugin-dir "$unzip_dir" --version 0.2.0 --format json | grep '"status": "PASS"'
          python3 scripts/write_checksums.py "$RUNNER_TEMP/dittobot-skill-v0.2.0.zip" "$RUNNER_TEMP/dittobot-plugin-v0.2.0.zip" --output "$RUNNER_TEMP/SHA256SUMS"
          grep "dittobot-skill-v0.2.0.zip" "$RUNNER_TEMP/SHA256SUMS"
          grep "dittobot-plugin-v0.2.0.zip" "$RUNNER_TEMP/SHA256SUMS"
          python3 scripts/scorecard.py --plugin-dir "$RUNNER_TEMP/dittobot-plugin" --version 0.2.0 | grep "Dittobot Public Eval Scorecard"
          scorecard="$RUNNER_TEMP/scorecard.json"
          python3 scripts/scorecard.py --plugin-dir "$RUNNER_TEMP/dittobot-plugin" --version 0.2.0 --format json > "$scorecard"
          python3 - "$scorecard" <<'PY'
          import json
          import sys
          payload = json.load(open(sys.argv[1], encoding="utf-8"))
          assert payload["schema_version"] == "dittobot.scorecard.v1"
          assert payload["suite"]["case_count"] == 100
          assert payload["suite"]["family_count"] == 30
          assert payload["score"]["status"] == "PASS"
          assert payload["score"]["public_score"] == 100.0
          assert payload["score"]["case_pass_rate"] == 1.0
          assert payload["score"]["family_balanced_pass_rate"] == 1.0
          assert payload["score"]["guardrail_floor"] == 1.0
          assert payload["coverage"]["prompt_modes"]["explicit_rewrite"] == 90
          assert payload["coverage"]["prompt_modes"]["source_only"] == 10
          guardrails = {row["name"]: row["cases"] for row in payload["coverage"]["guardrails"]}
          assert guardrails["voice_preservation"] == 38
          assert guardrails["protected_facts"] == 33
          assert guardrails["claim_fidelity"] == 26
          assert guardrails["uncertainty_handling"] == 16
          assert guardrails["source_only_default_inference"] == 10
          assert payload["plugin"]["status"] == "PASS"
          PY

      - name: Compile scripts
        run: python3 -m py_compile scripts/*.py

      - name: Check install verifier without local paths
        run: |
          mkdir -p "$RUNNER_TEMP/codex-skills"
          ln -s "$GITHUB_WORKSPACE" "$RUNNER_TEMP/codex-skills/dittobot"
          python3 scripts/check_install.py --install-dir "$RUNNER_TEMP/codex-skills/dittobot"

      - name: Check installer
        run: |
          python3 scripts/install.py --install-dir "$RUNNER_TEMP/codex-skills-installed/dittobot"
          python3 scripts/install.py --install-dir "$RUNNER_TEMP/codex-skills-installed/dittobot"
          python3 scripts/install.py --copy --install-dir "$RUNNER_TEMP/codex-skills-copy/dittobot"
          python3 scripts/check_install.py --install-dir "$RUNNER_TEMP/codex-skills-copy/dittobot"
          printf 'stale file\n' > "$RUNNER_TEMP/codex-skills-copy/dittobot/README.md"
          ! python3 scripts/check_install.py --install-dir "$RUNNER_TEMP/codex-skills-copy/dittobot"
          python3 scripts/install.py --copy --install-dir "$RUNNER_TEMP/codex-skills-copy/dittobot"
          python3 scripts/check_install.py --install-dir "$RUNNER_TEMP/codex-skills-copy/dittobot"

      - name: Check installer safety guards
        run: |
          ! python3 scripts/install.py --install-dir "$RUNNER_TEMP/codex-skills-installed/not-dittobot"
          ! python3 scripts/install.py --install-dir "$GITHUB_WORKSPACE"
          ! python3 scripts/install.py --install-dir "$GITHUB_WORKSPACE/dittobot"
          mkdir -p "$GITHUB_WORKSPACE/nested"
          ! python3 scripts/install.py --install-dir "$GITHUB_WORKSPACE/nested/dittobot"
          mkdir -p "$RUNNER_TEMP/unsafe-target/dittobot"
          printf 'not dittobot\n' > "$RUNNER_TEMP/unsafe-target/dittobot/README.md"
          ! python3 scripts/install.py --install-dir "$RUNNER_TEMP/unsafe-target/dittobot"
          python3 scripts/install.py --force --install-dir "$RUNNER_TEMP/unsafe-target/dittobot"
          existing="$RUNNER_TEMP/preflight-existing/dittobot"
          python3 scripts/install.py --copy --install-dir "$existing"
          broken="$RUNNER_TEMP/broken-source"
          mkdir -p "$broken/scripts"
          cp scripts/install.py scripts/package_files.py scripts/check_install.py "$broken/scripts/"
          cp SKILL.md "$broken/SKILL.md"
          ! python3 "$broken/scripts/install.py" --install-dir "$existing"
          python3 scripts/check_install.py --install-dir "$existing"

      - name: Check one-line installer
        run: |
          bash -n install.sh
          archive="$RUNNER_TEMP/dittobot.tar.gz"
          tar -czf "$archive" --exclude .git --exclude dist -C "$GITHUB_WORKSPACE/.." "$(basename "$GITHUB_WORKSPACE")"
          DITTOBOT_ARCHIVE_URL="file://$archive" bash install.sh --install-dir "$RUNNER_TEMP/codex-skills-one-line/dittobot"
          python3 scripts/check_install.py --install-dir "$RUNNER_TEMP/codex-skills-one-line/dittobot"
          decoy_source="$RUNNER_TEMP/decoy-source"
          mkdir -p "$decoy_source/dittobot-decoy"
          tar -cf - --exclude .git --exclude dist -C "$GITHUB_WORKSPACE" . | tar -xf - -C "$decoy_source/dittobot-decoy"
          mkdir -p "$decoy_source/dittobot-decoy/aaa/scripts"
          printf '#!/usr/bin/env python3\nraise SystemExit(42)\n' > "$decoy_source/dittobot-decoy/aaa/scripts/install.py"
          decoy_archive="$RUNNER_TEMP/dittobot-decoy.tar.gz"
          tar -czf "$decoy_archive" -C "$decoy_source" dittobot-decoy
          DITTOBOT_ARCHIVE_URL="file://$decoy_archive" bash install.sh --install-dir "$RUNNER_TEMP/codex-skills-decoy/dittobot"
          python3 scripts/check_install.py --install-dir "$RUNNER_TEMP/codex-skills-decoy/dittobot"

      - name: Verify live eval skip path
        env:
          OPENAI_API_KEY: ""
        run: python3 scripts/live_eval.py --limit 1

      - name: Verify live eval case inspection
        run: |
          python3 scripts/live_eval.py --list-cases --prompt-mode source_only | grep thought_dump
          python3 scripts/live_eval.py --print-prompts --prompt-mode source_only --limit 1 | grep "ok the launch note"
          ! python3 scripts/live_eval.py --max-failures 0
          ! python3 scripts/live_eval.py --max-total-tokens 0
          ! python3 scripts/live_eval.py --save-jsonl live-eval-results.jsonl --print-prompts --limit 1
